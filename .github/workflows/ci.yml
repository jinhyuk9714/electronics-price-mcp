name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic CI verification
        run: npm run verify:ci

      - name: Upload multisource merge reports
        uses: actions/upload-artifact@v4
        with:
          name: multisource-merge-report
          path: |
            reports/multisource-merge-latest.json
            reports/multisource-merge-latest.md
          if-no-files-found: error

